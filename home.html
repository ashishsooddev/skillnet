<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Weiyu Yin">
    <meta name="description" content="Job Finder">
    <meta name="keywords" content="html, css, web development">
    <link rel="icon" href="./assets/media/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="./assets/style/index.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="./assets/script/index.js" defer></script>
    <title>Skillnet</title>
</head>
    <body class="login-page">
    <div class="login-container">
      <div class="login-banner">
        <img src="./assets/media/mikhail-seleznev-H8Vvpn4NezI-unsplash.jpg" class="banner-img" alt="background">
      </div>
      <div class="login-main">
        <div class="login-card">
          <h2 class="login-title">Welcome to Skillnet!</h2>
          <form id="login-form" class="login-form">
            <div class="form-item">
              <input type="text" placeholder="Please enter your email address." id="email" required class="form-input">
            </div>
            <div class="form-item">
              <input type="password" placeholder="Please enter your password." id="password" minlength="6" maxlength="20" required class="form-input">
            </div>
            <p id="errorMessage" class="error-tip"></p>
            <a href="#" class="forgot-pwd">Forgot password?</a>
            <div class="form-btn-group">
              <button type="submit" class="btn login-btn">Login</button>
              <button type="button" class="btn register-btn">Sign up</button>
            </div>
          </form>
          <div class="social-login">
            <div class="divider">
              <span>Or login using the following account</span>
            </div>
            <div class="social-buttons">
              <a href="#" class="social-btn gmail" title="Gmail">
                <i class="fa-solid fa-envelope"></i>
              </a>
              <a href="#" class="social-btn ins" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
              </a>
              <a href="#" class="social-btn apple" title="Apple">
                <i class="fa-brands fa-apple"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
